<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Radix Sort Visualizer</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 10px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    #plot-wrapper {
      display: flex;
      align-items: stretch;
      margin-top: 20px;
    }

    #y-axis {
      height: 400px;
      width: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      padding-right: 8px;
      font-size: 12px;
      color: #555;
    }

    canvas {
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <h1>Radix Sort Visualizer</h1>

  <div id="controls">
    <button id="step-btn">GPU Step</button>
    <button id="reset-btn">Reset</button>
    <button id="play-btn">Play</button>
    <button id="stop-btn">Stop</button>
    <span id="status">Bit: 0</span>
  </div>
  <div id="plot-wrapper">
    <div id="y-axis">
      <div>100</div>
      <div>80</div>
      <div>60</div>
      <div>40</div>
      <div>20</div>
      <div>0</div>
    </div>

    <canvas id="gpu-canvas" width="800" height="400"></canvas>
  </div>


</body>

</html>
